<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>LAX Script Panel</title>
<script src="https://live.zwidgets.com/js-sdk/1.2/ZohoEmbededAppSDK.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Georgia, serif; background: #f9f7f4; color: #2a1f14; font-size: 13px; padding: 16px; }
.lead-name { font-size: 18px; font-weight: bold; color: #1a1008; margin-bottom: 6px; }
.badge { font-size: 10px; font-weight: bold; letter-spacing: 1.5px; padding: 3px 10px; border-radius: 3px; text-transform: uppercase; display: inline-block; margin-bottom: 12px; }
.badge-lax    { background: #ddeeff; color: #1a4a8a; border: 1px solid #aaccee; }
.badge-ii     { background: #ddfff0; color: #0a5a30; border: 1px solid #aaeedd; }
.badge-booked { background: #fff3dd; color: #8a4a00; border: 1px solid #eeccaa; }
.badge-unknown{ background: #f0f0f0; color: #666;    border: 1px solid #ccc; }
.urgency-row  { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.urgency-label{ font-size:10px; letter-spacing:1px; color:#8a7a6a; text-transform:uppercase; }
.urgency-pill { font-size:10px; font-weight:bold; padding:3px 10px; border-radius:10px; text-transform:uppercase; }
.HOT    { background:#ffe0e0; color:#8a0000; border:1px solid #ffaaaa; }
.WARM   { background:#fff3e0; color:#8a4a00; border:1px solid #ffccaa; }
.MEDIUM { background:#fffde0; color:#6a6a00; border:1px solid #eeee99; }
.COOL   { background:#eeeeff; color:#3a3a8a; border:1px solid #ccccee; }
.chips  { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
.chip   { background:#fff; border:1px solid #ddd; padding:3px 10px; border-radius:4px; font-size:11px; color:#4a3a2a; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
.chip span { color:#9a8a7a; margin-right:4px; }
.tabs   { display:flex; gap:2px; margin-bottom:0; }
.tab    { padding:6px 14px; font-size:10px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; background:#ede9e4; color:#8a7a6a; border:1px solid #d0c8c0; border-bottom:none; border-radius:4px 4px 0 0; }
.tab.active { background:#fff; color:#8a5a1a; border-color:#c8a860; font-weight:bold; }
.tab-body { background:#fff; border:1px solid #c8a860; border-radius:0 4px 4px 4px; padding:16px; min-height:180px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.script-box { border-left:4px solid #c8a860; padding:12px 16px; background:#fffdf7; border-radius:0 4px 4px 0; line-height:1.9; color:#2a1f14; font-size:13px; }
.gap-box    { border-left:4px solid #5a9a5a; padding:12px 16px; background:#f4fff4; border-radius:0 4px 4px 0; margin-top:10px; line-height:1.8; color:#1a4a1a; font-size:12px; }
.obj { background:#fafafa; border:1px solid #e8e0d8; border-radius:4px; margin-bottom:6px; }
.obj-q { padding:8px 12px; color:#8a3030; font-size:11px; font-style:italic; cursor:pointer; display:flex; justify-content:space-between; }
.obj-a { padding:8px 12px 12px; border-top:1px solid #e8e0d8; color:#3a2a1a; font-size:12px; line-height:1.8; display:none; background:#fff; }
.obj-a.open { display:block; }
.section-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:#9a8a7a; margin-bottom:10px; font-weight:bold; }
.val { background:#fff3dd; color:#8a4a00; padding:1px 6px; border-radius:3px; font-family:monospace; font-size:12px; border:1px solid #eeccaa; }
.no-script { background:#fff8f8; border:1px solid #f0cccc; border-radius:4px; padding:16px; color:#8a3030; text-align:center; line-height:1.8; }
ul.checklist { list-style:none; }
ul.checklist li { padding:7px 0; border-bottom:1px dotted #e0d8d0; color:#3a2a1a; font-size:12px; display:flex; gap:8px; }
ul.checklist li::before { content:"○"; color:#c8a860; }
.err { color:#8a0000; font-size:12px; padding:16px; background:#fff8f8; border:1px solid #f0cccc; border-radius:4px; }
</style>
</head>
<body>
<div id="loading" style="color:#8a7a6a;letter-spacing:2px;padding:20px;background:#f9f7f4;">Loading lead data…</div>
<div id="panel" style="display:none"></div>
<div id="error"  style="display:none"></div>

<script>
function showError(msg) {
  document.getElementById("loading").style.display = "none";
  var e = document.getElementById("error");
  e.className = "err";
  e.innerHTML = "⚠ " + msg;
  e.style.display = "block";
}

function g(lead, field) {
  var v = lead[field];
  return (v === null || v === undefined) ? "" : v.toString();
}

function initWidget() {
  ZOHO.embeddedApp.on("PageLoad", function(data) {
    try {
      var recordId = data.EntityId || (data.ID) || null;
      var entity   = data.Entity  || "Leads";

      if (!recordId) {
        showError("No record ID received from CRM. Data: " + JSON.stringify(data));
        return;
      }

      ZOHO.CRM.API.getRecord({ Entity: entity, RecordID: recordId })
        .then(function(res) {
          if (res && res.data && res.data.length > 0) {
            renderPanel(res.data[0]);
          } else {
            showError("Record fetched but no data returned. Check API permissions.");
          }
        })
        .catch(function(err) {
          showError("API error: " + JSON.stringify(err));
        });
    } catch(ex) {
      showError("PageLoad exception: " + ex.message);
    }
  });

  ZOHO.embeddedApp.init();
}

ZOHO.embeddedApp.on("PageLoad", function(data) {
  try {
    var recordId = data.EntityId;
    var entity   = data.Entity || "Leads";
    if (!recordId) { showError("No record ID. Raw data: " + JSON.stringify(data)); return; }
    ZOHO.CRM.API.getRecord({ Entity: entity, RecordID: recordId })
      .then(function(res) {
        if (res && res.data && res.data.length > 0) {
          renderPanel(res.data[0]);
        } else {
          showError("No data returned. Response: " + JSON.stringify(res));
        }
      })
      .catch(function(err) { showError("API error: " + JSON.stringify(err)); });
  } catch(ex) { showError("Error: " + ex.message); }
});
ZOHO.embeddedApp.init();

function v(val) { return '<span class="val">' + (val || "—") + "</span>"; }

function renderPanel(lead) {
  var fn        = g(lead,"First_Name") || "this lead";
  var tag       = g(lead,"Tag").toLowerCase();
  var page      = g(lead,"Funnel_Entry_Page").toLowerCase();
  var quizScore = g(lead,"Quiz_Composite_Score");
  var quizGap   = g(lead,"Quiz_Gap_Dimension");
  var gapScore  = g(lead,"Quiz_Gap_Score");
  var concScore = g(lead,"Concentration_Score");
  var scoreTier = g(lead,"Score_Tier");
  var corrPct   = g(lead,"Correlated_Pct");
  var blindSpot = g(lead,"Highest_Blind_Spot");
  var iiScore   = g(lead,"Composite_Score");
  var swag      = g(lead,"SWAG_Assets_Viewed").toLowerCase();
  var laxQ6     = g(lead,"LAX_Q6_Action_Urgency").toLowerCase();
  var iiQ9      = g(lead,"II_Q9_Action_Urgency1").toLowerCase();

  var isBooked = tag.includes("call_booked");
  var isLAX    = tag.includes("lax_");
  var isII     = tag.includes("tof_") || (tag.includes("quiz_complete") && !tag.includes("lax_quiz"));

  var scriptType = "UNKNOWN";
  if      (isBooked)                                                        scriptType = "BOOKED_SESSION";
  else if (page.includes("go.start.thelax.art/score")   || page.includes("/score")  || tag.includes("lax_calculator"))  scriptType = "LAX_SCORER";
  else if (page.includes("go.start.thelax.art/quiz")    || page.includes("/quiz")   || tag.includes("lax_quiz"))         scriptType = "LAX_QUIZ";
  else if (page.includes("go.start.thelax.art/opportunities") || page.includes("/opportunities") || tag.includes("llax_opplist")) scriptType = "LAX_OPPLIST";
  else if (page.includes("investintellect.co.uk/article-2")    || page.includes("investintellect.co.uk/advertorial-2") || page.includes("investintellect.co.uk/masterclass-2")) scriptType = "II_OUTBOUND";
  else if (tag.includes("quiz_complete") && isII)                           scriptType = "II_ASSESSMENT";
  else if (tag.includes("tof_masterclass"))                                 scriptType = "II_MASTERCLASS";
  else if (tag.includes("tof_article"))                                     scriptType = "II_ARTICLE";
  else if (tag.includes("tof_advertorial"))                                 scriptType = "II_ADVERTORIAL";

  var urgencyAnswer = isLAX ? laxQ6 : iiQ9;
  var urgency = "COOL";
  if      (urgencyAnswer.includes("ready now") || urgencyAnswer.includes("actively looking")) urgency = "HOT";
  else if (urgencyAnswer.includes("few months"))                                              urgency = "WARM";
  else if (urgencyAnswer.includes("this year")  || urgencyAnswer.includes("sometime"))       urgency = "MEDIUM";

  var badgeClass = isBooked ? "badge-booked" : (isLAX ? "badge-lax" : (isII ? "badge-ii" : "badge-unknown"));
  var badgeLabel = isBooked ? "BOOKED SESSION" : (isLAX ? "LAX LEAD" : (isII ? "II LEAD" : "UNKNOWN SOURCE"));

  var html = "";
  html += '<div class="lead-name">' + fn + "</div>";
  html += '<span class="badge ' + badgeClass + '">' + badgeLabel + "</span>";
  html += '<div class="urgency-row"><span class="urgency-label">Action Urgency</span>';
  html += '<span class="urgency-pill ' + urgency + '">' + urgency + "</span></div>";

  html += '<div class="chips">';
  if (concScore) html += '<div class="chip"><span>Conc Score:</span>'  + concScore + "</div>";
  if (scoreTier) html += '<div class="chip"><span>Tier:</span>'        + scoreTier + "</div>";
  if (corrPct)   html += '<div class="chip"><span>Correlated:</span>'  + corrPct + "%</div>";
  if (quizScore) html += '<div class="chip"><span>Quiz Score:</span>'  + quizScore + "/100</div>";
  if (quizGap)   html += '<div class="chip"><span>Gap:</span>'         + quizGap + "</div>";
  if (blindSpot) html += '<div class="chip"><span>Blind Spot:</span>'  + blindSpot + "</div>";
  html += "</div>";

  html += '<div class="tabs">';
  html += '<div class="tab active" onclick="switchTab(this,\'opening\')">Opening</div>';
  html += '<div class="tab" onclick="switchTab(this,\'dimension\')">Dimension</div>';
  html += '<div class="tab" onclick="switchTab(this,\'objections\')">Objections</div>';
  if (isBooked) html += '<div class="tab" onclick="switchTab(this,\'checklist\')">Pre-Call</div>';
  html += "</div>";

  html += '<div class="tab-body">';
  html += '<div id="tab-opening">'                          + buildOpening(scriptType,fn,quizScore,quizGap,gapScore,concScore,scoreTier,corrPct,blindSpot) + "</div>";
  html += '<div id="tab-dimension"   style="display:none">' + buildDimension(quizGap || blindSpot) + "</div>";
  html += '<div id="tab-objections"  style="display:none">' + buildObjections() + "</div>";
  if (isBooked) html += '<div id="tab-checklist" style="display:none">' + buildChecklist() + "</div>";
  html += "</div>";

  document.getElementById("loading").style.display = "none";
  document.getElementById("panel").innerHTML = html;
  document.getElementById("panel").style.display = "block";
}

function buildOpening(type,fn,quizScore,quizGap,gapScore,concScore,scoreTier,corrPct,blindSpot) {
  var s = '<div class="section-label">Opening Script — Read Aloud</div>';
  if (type === "BOOKED_SESSION") {
    s += '<div class="script-box">"Hi ' + v(fn) + ', great to meet you. This is ' + v("[Your Name]") + ' from <strong>London Art Exchange</strong>. Thank you for booking this in."<br><br>"I\'ve had a chance to review your results. But I want to start by hearing from you — <strong>what prompted you to book this session?</strong>"<br><br><em style="color:#6a5a4a">Let them talk first.</em></div>';
  } else if (type === "LAX_SCORER") {
    s += '<div class="script-box">"Hi ' + v(fn) + ', this is ' + v("[Your Name]") + ' from <strong>London Art Exchange</strong>. You used our Portfolio Concentration Calculator and your results flagged some interesting patterns."<br><br><em style="color:#6a5a4a">[PAUSE]</em><br><br>"Your concentration score came back at ' + v(concScore) + ' — the ' + v(scoreTier) + ' range. ' + v(corrPct + "%") + ' of your portfolio is in correlated assets."<br><br>"<strong>Was the score roughly what you expected, or did anything surprise you?</strong>"</div>';
  } else if (type === "LAX_QUIZ") {
    s += '<div class="script-box">"Hi ' + v(fn) + ', this is ' + v("[Your Name]") + ' from <strong>London Art Exchange</strong>. You completed our Art Investor Readiness Assessment and I wanted to touch base."<br><br><em style="color:#6a5a4a">[PAUSE]</em><br><br>"Your readiness score was ' + v(quizScore) + '/100. Your biggest gap was ' + v(quizGap) + ' at ' + v(gapScore) + '. That\'s very common."<br><br>"<strong>What prompted you to take the assessment?</strong>"</div>';
  } else if (type === "LAX_OPPLIST") {
    s += '<div class="script-box">"Hi ' + v(fn) + ', this is ' + v("[Your Name]") + ' from <strong>London Art Exchange</strong>. You downloaded our Art Investment Briefing recently — the one covering three artists our advisory team is watching."<br><br><em style="color:#6a5a4a">[PAUSE]</em><br><br>"<strong>Was there a specific artist that caught your eye?</strong>"</div>';
  } else if (type === "II_ASSESSMENT") {
    s += '<div class="script-box">"Hi ' + v(fn) + ', this is ' + v("[Your Name]") + '. You were referred by <strong>Invest Intellect</strong>. You completed their Portfolio Blind Spot Assessment."<br><br><em style="color:#6a5a4a">[PAUSE]</em><br><br>"Your results showed ' + v(blindSpot) + ' is your biggest gap. Does that resonate?"<br><br>"<strong>Can I walk you through what an art allocation looks like in that context?</strong>"</div>';
  } else if (type === "II_OUTBOUND") {     s += '<div class="script-box">"Hi ' + v(fn) + ', this is ' + v("[Your Name]") + '. You were referred to us by <strong>Invest Intellect</strong> — you came across one of their resources recently and they flagged you as someone who might benefit from a specialist conversation."<br><br><em style="color:#9a8a7a">[PAUSE]</em><br><br>"I specialise in art as a portfolio allocation. I\'m not here to sell you anything today — I just wanted to understand what prompted your interest in alternative assets and see if there\'s anything I can help with."<br><br>"<strong>What was it about the content that caught your attention?</strong>"</div>';
    var what = type === "II_MASTERCLASS" ? "watched their masterclass" : "downloaded their Alternative Asset Allocation Report";
    s += '<div class="script-box">"Hi ' + v(fn) + ', this is ' + v("[Your Name]") + '. You were referred by <strong>Invest Intellect</strong> — you ' + what + ' recently."<br><br><em style="color:#6a5a4a">[PAUSE]</em><br><br>"I specialise in art as a portfolio allocation. Not here to sell — just want to understand your interest."<br><br>"<strong>What caught your attention about the ' + (type === "II_MASTERCLASS" ? "masterclass" : "report") + '?</strong>"</div>';
  } else {
    s += '<div class="no-script">⚠ Script not determined.<br><br>Tag field value: <strong>' + (document._tagDebug || "check Tag field") + '</strong><br><br>The Tag or Funnel Entry Page field is empty or unrecognised on this lead. Check those two fields.</div>';
  }
  return s;
}

function buildDimension(gap) {
  var plays = {
    "Market Knowledge":   { col:"#3a6a3a", what:"Low understanding of art as a financial asset.", need:"Education first — data before pitch.", line:'"Your assessment flagged Market Knowledge as your biggest gap. Let me share a few numbers that tend to change how investors think about this."', data:"£1.7T global art market · -0.04 correlation with equities · UCL: 10–20% art allocation improves risk-adjusted returns ~20%" },
    "Portfolio Fit":      { col:"#3a5a6a", what:"Understands art but portfolio doesn\'t reflect it.", need:"Bridge knowledge to action.", line:'"The question is not whether art belongs in a diversified portfolio — the research answers that. The question is whether your portfolio reflects what you already know."', data:"" },
    "Timeline Alignment": { col:"#6a4a1a", what:"Stated timeline may not match art\'s 5–10 year hold.", need:"Honest expectation setting.", line:'"Art is not a quick flip. Investors who see the strongest results plan for 5 to 10 years."', data:"" },
    "Action Readiness":   { col:"#6a3a1a", what:"Interested but something is holding them back.", need:"Find and remove the blocker.", line:'"What would need to change for you to feel ready?"', data:"" },
    "Diversification":    { col:"#3a3a6a", what:"Portfolio concentrated in correlated assets.", need:"Show the correlation risk.", line:'"Art\'s correlation with equities is -0.04 over 60 years. As close to uncorrelated as you can get."', data:"" },
    "Tangible Assets":    { col:"#4a3a1a", what:"No physical asset-backed holdings.", need:"Open the door to tangible assets.", line:'"44% of family office assets now sit outside stocks and bonds."', data:"" },
    "Legacy Planning":    { col:"#3a1a4a", what:"No formalised wealth transfer plan.", need:"Connect art to IHT and estate planning.", line:'"Art can qualify for inheritance tax relief while delivering financial returns."', data:"" },
    "Access":             { col:"#2a2a4a", what:"Feels excluded from sophisticated opportunities.", need:"Position LAX as the gatekeeper.", line:'"Alternative assets aren\'t well-served by traditional advisers because there\'s no fund commission. That\'s why most investors never hear about it."', data:"" }
  };
  var displayGap = gap || "Not set";
  var leadNameForGap = fn || "this lead";
  var s = '<div class="section-label">Dimension Playbook — Gap: ' + displayGap + "</div>";
  var play = plays[gap];
  if (!play && gap) { for (var k in plays) { if (gap.toLowerCase().includes(k.toLowerCase())) { play = plays[k]; break; } } }
if (!play) {
    s += '<div class="no-script">No gap dimension set for <strong>' + leadNameForGap + '</strong>.</div>';
    return s;
  }
  if (play) {
    s += '<div class="script-box" style="border-left-color:' + play.col + '"><strong style="color:#5a3a0a">What it means:</strong> ' + play.what + "<br><br><strong style=\"color:#5a3a0a\">What they need:</strong> " + play.need + "</div>";
    s += '<div class="gap-box"><strong>Framing line:</strong><br><br><em>' + play.line + "</em>";
    if (play.data) s += "<br><br><strong>Key data:</strong> " + play.data;
    s += "</div>";
  }
  return s;
}

function buildObjections() {
  var objs = [
    ['"I\'m not interested"', '"I completely understand. I\'m not here to sell you anything. Your results flagged something worth a quick conversation. If after two minutes you feel it\'s not relevant, I won\'t take up any more of your time. Fair?"'],
    ['"I already have a financial adviser"', '"We don\'t replace your adviser — we work alongside them. Most financial advisers don\'t cover tangible assets like art because it\'s outside their regulatory scope. We fill a very specific gap."'],
    ['"Art is not a real investment"', '"There\'s a fundamental difference between buying art you like and investing in art for returns. UCL research showed a 10–20% allocation to blue-chip art enhanced portfolio risk-adjusted returns by approximately 20%."'],
    ['"How did you get my number?"', '"You submitted your number when you completed the assessment. We mentioned at that point that a specialist would be in touch. If now isn\'t a good time, I\'m happy to schedule a call."'],
    ['"Send me an email instead"', '"Absolutely — before I do, can I ask one quick question? What was it that prompted you to take the assessment? That way I can make sure the email covers what\'s actually relevant to you."']
  ];
  var s = '<div class="section-label">Early Objection Responses — Click to Expand</div>';
  objs.forEach(function(o, i) {
    s += '<div class="obj"><div class="obj-q" onclick="toggleObj(\'o' + i + '\')">' + o[0] + "</div>";
    s += '<div class="obj-a" id="o' + i + '">' + o[1] + "</div></div>";
  });
  return s;
}

function buildChecklist() {
  var items = ["Check Funnel Entry Page and Source URL fields","Read individual quiz/assessment answers — not just scores","Note Concentration Score and allocation percentages","Check Action Urgency answer (LAX_Q6 or II_Q9)","Prepare one data point relevant to their Gap Dimension","Have the Dimension tab ready to reference during the call"];
  var s = '<div class="section-label">Pre-Call Checklist</div><ul class="checklist">';
  items.forEach(function(i) { s += "<li>" + i + "</li>"; });
  s += "</ul><br><div class=\"section-label\">Strategy Session Structure</div>";
  s += '<div class="script-box"><strong>Mins 1–5:</strong> Opening. Let them talk.<br><strong>Mins 5–15:</strong> Walk through results. Use Dimension tab.<br><strong>Mins 15–25:</strong> Present the opportunity.<br><strong>Mins 25–30:</strong> "Shall I put together a shortlist aligned to your timeline, budget, and goals?"</div>';
  return s;
}

function switchTab(el, name) {
  document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
  document.querySelectorAll(".tab-body > div").forEach(function(t) { t.style.display = "none"; });
  el.classList.add("active");
  document.getElementById("tab-" + name).style.display = "block";
}

function toggleObj(id) {
  document.getElementById(id).classList.toggle("open");
}
</script>
</body>
</html>
